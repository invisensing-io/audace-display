name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published, or on manual dispatch.
# Authentication uses PyPI Trusted Publishing (OIDC) -- no API token is stored.
# Configure the trusted publisher once on PyPI (see README / repo docs):
#   project: audace-display, owner: invisensing-io, repo: audace-display,
#   workflow: publish.yml, environment: pypi

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build + test + check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Test before publishing
        env:
          MPLBACKEND: Agg
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
          pytest -q

      - name: Build sdist + wheel
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/audace-display
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
